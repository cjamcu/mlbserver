<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{appname}} - Simple View</title>
    <link rel="icon" href="favicon.svg{{content_protect}}">
    <style type="text/css">
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            font-size: 14px;
            overflow-x: hidden;
        }
        
        input[type=text], input[type=button] {
            -webkit-appearance: none;
            appearance: none;
            -webkit-border-radius: 0;
            border-radius: 0;
        }
        
        input[type=date] {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #333, #444);
            border: 1px solid #555;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 4px;
        }
        
        button:hover {
            background: linear-gradient(135deg, #444, #555);
            border-color: #666;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        button.default {
            background: linear-gradient(135deg, #007acc, #005a9e);
            border-color: #0088ff;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .game-card {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: #555;
        }
        .game-card.live {
            border-color: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
        }
        .game-card.final {
            border-color: #666;
            opacity: 0.8;
        }
        .game-card.scheduled {
            border-color: #007acc;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .teams {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .time {
            font-size: 14px;
            color: #999;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .game-status {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 12px;
            padding: 6px 0;
        }
        .game-card.live .game-status {
            color: #ff6666;
            font-weight: 600;
        }
        .game-card.final .game-status {
            color: #999;
        }
        .game-card.scheduled .game-status {
            color: #66b3ff;
        }
        .game-actions {
            text-align: center;
        }
        .watch-btn {
            display: inline-block;
            background: linear-gradient(135deg, #007acc, #005a9e);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .watch-btn:hover {
            background: linear-gradient(135deg, #0088ff, #0066cc);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 122, 204, 0.3);
        }
        .no-stream {
            color: #666;
            font-style: italic;
            font-size: 14px;
        }
        
        a {
            color: #007acc;
            text-decoration: none;
        }
        
        a:hover {
            color: #0088ff;
            text-decoration: underline;
        }
        
        .controls {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-radius: 8px;
            border: 1px solid #333;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .date-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .start-from-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .no-games {
            text-align: center;
            color: #999;
            font-style: italic;
            margin-top: 32px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .controls {
                padding: 12px;
            }
            
            .date-controls, .start-from-controls {
                justify-content: center;
            }
            
            button {
                flex: 1;
                min-width: 0;
                max-width: 120px;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 6px;
            }
        }
    </style>
    <script type="text/javascript">
        var date = "{{gameDate}}";
        var startFrom = "{{startFrom}}";
        var gamesData = {{gamesData}};
        var httpRoot = "{{http_root}}";
        var contentProtect = "{{content_protect}}";
        
        function reload() {
            var url = httpRoot + "/?date=" + encodeURIComponent(date);
            if (contentProtect) {
                url += "&content_protect=" + contentProtect;
            }
            window.location.href = url;
        }
        
        function setDate(d) {
            date = d;
            reload();
        }
        
        function updateGamesList() {
            var gamesContainer = document.getElementById('gamesContainer');
            if (!gamesContainer) return;
            
            if (gamesData.length === 0) {
                gamesContainer.innerHTML = '<div class="no-games">No games found for ' + date + '</div>';
                return;
            }
            
            var html = '<div class="games-grid">';
            
            for (var i = 0; i < gamesData.length; i++) {
                var game = gamesData[i];
                var statusClass = '';
                if (game.state.includes('Live')) {
                    statusClass = 'live';
                } else if (game.state.includes('Final')) {
                    statusClass = 'final';
                } else if (game.state.includes('Scheduled')) {
                    statusClass = 'scheduled';
                }
                
                html += '<div class="game-card ' + statusClass + '">';
                html += '<div class="game-header">';
                html += '<div class="teams">' + game.teams + '</div>';
                html += '<div class="time">' + game.time + '</div>';
                html += '</div>';
                html += '<div class="game-status">' + game.state + '</div>';
                
                if (game.hasStream) {
                    var embedUrl = httpRoot + '/embed.html?mediaId=' + game.mediaId + '&startFrom=Live';
                    if (contentProtect) {
                        embedUrl += '&content_protect=' + contentProtect;
                    }
                    html += '<div class="game-actions">';
                    html += '<a href="' + embedUrl + '" class="watch-btn">Watch Live</a>';
                    html += '</div>';
                } else {
                    html += '<div class="game-actions">';
                    html += '<span class="no-stream">No Stream Available</span>';
                    html += '</div>';
                }
                
                html += '</div>';
            }
            
            html += '</div>';
            gamesContainer.innerHTML = html;
        }
        
        // Initialize games list when page loads
        document.addEventListener('DOMContentLoaded', function() {
            updateGamesList();
        });
    </script>
</head>
<body>
    <h1>{{appname}} - Simple View</h1>
    
    <!-- Controls section -->
    <div class="controls">
        <!-- Date controls -->
        <div class="control-group">
            <label>Date</label>
            <div class="date-controls">
                <input type="date" id="gameDate" value="{{gameDate}}" onchange="setDate(this.value)">
                <button {{todayDefault}} onclick="setDate('today')">today</button>
                <button {{yesterdayDefault}} onclick="setDate('yesterday')">yesterday</button>
            </div>
        </div>
    </div>
    
    <!-- Game list -->
    <div id="gamesContainer">
        <!-- Games will be dynamically loaded here -->
    </div>
</body>
</html>
